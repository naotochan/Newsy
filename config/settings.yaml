max_articles_per_feed: 3
max_articles_total: 50
max_articles_per_episode: 5   # 1エピソードあたりの記事数（≒5分）
min_articles_per_episode: 3   # これ未満なら前のEPにまとめる

llm:
  provider: "lmstudio"   # "anthropic" or "lmstudio"
  lmstudio:
    base_url: "http://localhost:1234/v1"
    model: "local-model"
    max_tokens: 2048
  anthropic:
    model: "claude-sonnet-4-6"
    max_tokens: 4096

tts:
  provider: "voicevox"   # "elevenlabs" or "voicevox"

speakers:
  host:
    name: "めたん"
    voicevox_id: 2                    # VOICEVOX 用: 四国めたん ノーマル
    elevenlabs_voice_id: "sRYzP8TwEiiqAWebdYPJ"           # ElevenLabs 用: Voice Library から取得
  assistant:
    name: "ずんだもん"
    voicevox_id: 3                    # VOICEVOX 用: ずんだもん ノーマル
    elevenlabs_voice_id: "EVmK7c3z026INySFvQLP"           # ElevenLabs 用: Voice Library から取得

elevenlabs:
  model_id: "eleven_multilingual_v2"  # eleven_multilingual_v2 / eleven_v3
  output_format: "mp3_44100_128"
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0

voicevox:
  base_url: "http://localhost:50021"
  speed_scale: 1.1

output:
  dir: "output"
  bitrate: "192k"
